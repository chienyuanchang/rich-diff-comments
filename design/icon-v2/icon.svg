<?xml version="1.0" encoding="UTF-8"?>
<!--
  Markdown PR Comments for GitHub — icon v3
  Master: 1024×1024. Designed to remain legible down to 16×16.

  Visual concept (v3):
    • Bubble IS the entire icon — no surrounding tile.
      Solid GitHub-blue speech-bubble silhouette fills nearly the
      whole canvas, with the bottom-left tail extending into the
      remaining corner.
    • Bold white "M" + chunky down-arrow inside (the Markdown mark).
    • Transparent background: looks clean on any toolbar colour.
    • Two ideas, one glance — no third element to lose at 16px.

  Padding: ~30px outer margin so the corners don't get clipped by
  Chrome/Edge's install-list cropping.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Solid blue speech bubble: body fills 30→994 wide and 30→860 tall,
       corner radius 130. Tail drops from the bottom edge to (140, 994). -->
  <path fill="#0969da" d="
      M 160 30
      H 864
      Q 994 30 994 160
      V 730
      Q 994 860 864 860
      H 370
      L 140 994
      Q 100 1012 110 980
      L 160 860
      Q 30 860 30 730
      V 160
      Q 30 30 160 30
      Z
  "/>

  <!-- "M" wordmark + custom-drawn chunky down-arrow, in white.
       Pair centred horizontally on tile centre (x=512) and vertically
       on bubble body centre (y=445).
       To shift the pair: change the M's x and every arrow x by the
       same delta. To resize: scale font-size and all arrow numbers. -->
  <text
    x="340"
    y="425"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-weight="700"
    font-size="572"
    fill="#ffffff"
  >M</text>

  <!-- Down-arrow: top aligned with M cap top (y≈239), tip aligned with
       M baseline (y≈651). Stem 120 wide, head 320 wide. -->
  <path fill="#ffffff" d="
      M 710 269
      H 830
      V 520
      H 930
      L 770 681
      L 610 520
      H 710
      Z
  "/>
</svg>
